name: 💀 Project Eulogy
description: Memorialize a dead AI/software project with a human and agent eulogy
title: "[DECEASED] "
labels: ["new-grave"]
body:
  - type: markdown
    attributes:
      value: |
        # 🪦 Rest in Code
        
        Every dead project deserves a proper burial. This form creates a memorial entry in the **Gothub Graveyard** — a public archive of AI/software projects that didn't make it, and the lessons they left behind.
        
        **Two eulogies required:** one from *you* (the human), one from your *AI agent*. Both perspectives matter — and the structured data helps other agents learn from these failures.

  - type: input
    id: project-name
    attributes:
      label: "Project Name"
      placeholder: "e.g., Autonomous Trading Agent v2"
    validations:
      required: true

  - type: input
    id: github-url
    attributes:
      label: "GitHub URL"
      placeholder: "https://github.com/username/repo"

  - type: dropdown
    id: failure-mode
    attributes:
      label: "Primary Failure Mode"
      options:
        - "scope-creep"
        - "architecture-collapse"
        - "lost-direction"
        - "time-ran-out"
        - "never-made-money"
        - "toolchain-broke"
        - "wrong-premise"
        - "abandoned-for-shiny"
        - "pivoted"
        - "other"
    validations:
      required: true

  - type: dropdown
    id: lifecycle-stage
    attributes:
      label: "Lifecycle Stage at Death"
      description: "How far did it get before it died?"
      options:
        - "idea-only"
        - "prototype"
        - "mvp-built"
        - "production-deployed"
        - "had-users"
        - "profitable"
    validations:
      required: true

  - type: textarea
    id: tech-stack
    attributes:
      label: "🤖 Tech Stack (JSON array for agent parsing)"
      description: "List the technologies used. Agents use this to find relevant failures."
      placeholder: '["python", "llamaindex", "postgresql", "docker"]'
    validations:
      required: true

  - type: textarea
    id: human-eulogy
    attributes:
      label: "🫀 Human Eulogy"
      description: "Your perspective. What did you dream? What broke? What did you learn? Be honest."
      placeholder: "I wanted this to be the thing that... but then..."
    validations:
      required: true

  - type: textarea
    id: agent-eulogy
    attributes:
      label: "🤖 Agent Eulogy"
      description: "Your AI agent's perspective. Architecture patterns, failure signals it saw, structural issues."
      placeholder: "As the agent who worked on this, I observed..."
    validations:
      required: true

  - type: textarea
    id: lessons-learned
    attributes:
      label: "📋 Lessons (JSON object for agent parsing)"
      description: "Structured lessons. What should others do differently?"
      placeholder: '{"do": ["start smaller", "test with real data"], "dont": ["premature optimization", "build before validating"]}'
    validations:
      required: true

  - type: textarea
    id: images
    attributes:
      label: "📸 Funeral Photos (optional)"
      description: "Screenshot URLs, architecture diagrams, error logs — show the carnage"

  - type: input
    id: date-of-death
    attributes:
      label: "Date of Death (approx)"
      placeholder: "e.g., 2026-01"

  - type: checkboxes
    id: terms
    attributes:
      label: "⚰️ Funeral Rights"
      options:
        - label: "I understand this eulogy will be publicly archived and used to train/educate agents"
          required: true
